<!DOCTYPE html>
<html>
<head>
    <title>White Theme Box</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .box {
            position: relative;
            width: 400px;
            height: 400px;
            background-color: white;
            overflow: hidden;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .box img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            top: 0;
            left: 0;
            z-index: 0;
            transition: opacity 1s ease-in-out;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        h1, h5 {
            color: white;
            margin: 10px 0;
        }

        p {
            color: white;   /* Paragraph text white */
        }

        .black-text {
            color: black;   /* Only the word White will be black */
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="box">
        <!-- Background Images -->
        <img src="https://picsum.photos/id/1015/800/600" class="slide">
        <img src="https://picsum.photos/id/1016/800/600" class="slide">
        <img src="https://picsum.photos/id/1018/800/600" class="slide">
        <img src="https://picsum.photos/id/1020/800/600" class="slide">
        <img src="https://picsum.photos/id/1024/800/600" class="slide">

        <div class="content">
            <h1>WHITE</h1>
            <h5>WHITE</h5>
            <p>
                <span class="black-text">White</span> represents purity, peace, and simplicity. 
                It reflects all colors of the light spectrum and creates a sense of clarity.
            </p>
        </div>
    </div>

    <script>
        let slides = document.querySelectorAll(".slide");
        let index = 0;

        function showSlide() {
            slides.forEach((slide) => {
                slide.style.opacity = "0";
            });

            slides[index].style.opacity = "0.4";
            index = (index + 1) % slides.length;
        }

        setInterval(showSlide, 2000);
        showSlide();
    </script>

</body>
</html>
